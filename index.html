<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- taildwin css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
</head>
<body>

    <header class="w-[80%] mx-auto">
        <h1 class="text-6xl font-bold text-[#002C5C]">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-8 rounded-lg mt-8">
            <div class=" bg-amber-300 p-4 rounded-lg mt-4">
                <p>Total</p>
                <p id="total-count">0</p>
            </div>
            <div class=" bg-green-300 p-4 rounded-lg mt-4">
                <p>Interview</p>
                <p id="interview-count">0</p>
            </div>
            <div class=" bg-red-300 p-4 rounded-lg mt-4">
                <p>Rejected</p>
                <p id="rejected-count">0</p>
            </div>
        </div>
    </header>
    <hr class="w-[80%] mx-auto mt-8 mb-8">
    
</body>
</html>
